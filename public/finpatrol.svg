<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="FinPatrol">
  <defs>
    <linearGradient id="fp_g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#22D3EE" />
    </linearGradient>
    <filter id="fp_s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- scan ring -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="url(#fp_g)" stroke-width="10" opacity="0.95" />
  <circle cx="64" cy="64" r="44" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2" />

  <!-- shield -->
  <path
    d="M64 34c10.8 6 19.5 7.2 27 8.3v22.1c0 16.3-10.1 26.3-27 33.6c-16.9-7.3-27-17.3-27-33.6V42.3C44.5 41.2 53.2 40 64 34z"
