<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云巡凭据采集助手</title>
    <style>
      body {
        margin: 0;
        width: 360px;
        background: #0f1116;
        color: #f4f4f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      .wrap {
        padding: 14px;
      }
      .title {
        font-size: 14px;
        font-weight: 700;
      }
      .sub {
        margin-top: 4px;
        font-size: 12px;
        color: #a1a1aa;
      }
      .box {
        margin-top: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 10px;
        background: #121622;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 6px;
        font-size: 12px;
      }
      .btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #1b2233;
        color: #f4f4f5;
        padding: 9px 10px;
        font-size: 12px;
      }
      button:hover {
        background: #252f47;
      }
      .wide {
        grid-column: 1 / 3;
      }
      .status {
        margin-top: 10px;
        min-height: 16px;
        font-size: 12px;
        color: #67e8f9;
      }
      .warn {
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">云巡凭据采集助手</div>
      <div class="sub">先打开阿里云/CFM 页面触发一次请求，再点击复制按钮。</div>

      <div class="box">
        <div class="row"><span>阿里云</span><span id="aliyun-status">未采集</span></div>
        <div class="row"><span>CFM</span><span id="cfm-status">未采集</span></div>
      </div>

      <div class="btns">
        <button id="copy-aliyun">复制阿里云凭据</button>
        <button id="copy-cfm">复制 CFM 凭据</button>
        <button class="wide" id="copy-all">复制合并 JSON</button>
        <button class="wide" id="clear-all">清空采集数据</button>
      </div>

      <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
